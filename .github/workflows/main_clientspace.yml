# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Deploy Portal to ClientSpace (Production)

on:
  push:
    branches:
      - main
    paths:
      - 'src/portal-blazor/**'
      - 'src/api-dotnet/WebApi/**'
      - '.github/workflows/main_clientspace.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build Blazor Portal
    runs-on: windows-latest
    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Create Production Configuration
        env:
          AZURE_AD_CLIENT_ID: ${{ secrets.AZURE_AD_CLIENT_ID }}
          AZURE_AD_CLIENT_SECRET: ${{ secrets.AZURE_AD_CLIENT_SECRET }}
          AZURE_AD_TENANT_ID: ${{ secrets.AZURE_AD_TENANT_ID }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
        run: |
          # Create appsettings.Production.json with secrets from repository if available
          # SECURITY NOTE: This file is created at build time and should NEVER be committed to source control
          # It's listed in .gitignore to prevent accidental commits
          if (-not [string]::IsNullOrEmpty($env:AZURE_AD_CLIENT_ID) -and -not [string]::IsNullOrEmpty($env:AZURE_AD_CLIENT_SECRET) -and -not [string]::IsNullOrEmpty($env:AZURE_AD_TENANT_ID)) {
            # Build JSON configuration using ConvertTo-Json for proper formatting
            $config = @{
              Logging = @{
                LogLevel = @{
                  Default = "Information"
                  "Microsoft.AspNetCore" = "Warning"
                }
              }
              AzureAd = @{
                Instance = "https://login.microsoftonline.com/"
                TenantId = $env:AZURE_AD_TENANT_ID
                ClientId = $env:AZURE_AD_CLIENT_ID
                ClientSecret = $env:AZURE_AD_CLIENT_SECRET
                CallbackPath = "/signin-oidc"
                SignedOutCallbackPath = "/signout-callback-oidc"
              }
            }
            # Include ApiSettings.BaseUrl when API_BASE_URL secret is configured
            if (-not [string]::IsNullOrEmpty($env:API_BASE_URL)) {
              $config["ApiSettings"] = @{
                BaseUrl = $env:API_BASE_URL
                Timeout = 30
              }
              Write-Host "✅ ApiSettings.BaseUrl configured: $($env:API_BASE_URL)"
            } else {
              Write-Host "⚠️ API_BASE_URL secret not set - portal will use fallback from Azure App Service settings or appsettings.json"
              Write-Host "ℹ️ To enable dashboard API calls, add the 'API_BASE_URL' repository secret:"
              Write-Host "   Value: the base URL of the deployed API App Service (e.g. https://your-api.azurewebsites.net)"
            }
            $config | ConvertTo-Json -Depth 10 | Out-File -FilePath ./src/portal-blazor/SharePointExternalUserManager.Portal/appsettings.Production.json -Encoding UTF8
            Write-Host "✅ Production configuration created with secrets from repository"
            Write-Host "📁 File location: appsettings.Production.json"
            Write-Host "⚠️  Note: This file contains secrets and will NOT be committed to source control"
          } else {
            Write-Host "ℹ️ Azure AD secrets not configured - skipping appsettings.Production.json generation"
            Write-Host "Application will use configuration from Azure App Service settings or other sources"
          }

      - name: Build with dotnet
        run: dotnet build --configuration Release
        working-directory: ./src/portal-blazor/SharePointExternalUserManager.Portal

      - name: Publish with dotnet
        run: dotnet publish -c Release -o "${{env.DOTNET_ROOT}}/myapp"
        working-directory: ./src/portal-blazor/SharePointExternalUserManager.Portal

      - name: Verify appsettings files in publish output
        run: |
          Write-Host "Checking for appsettings files in publish output:"
          Get-ChildItem -Path "${{env.DOTNET_ROOT}}/myapp" -Filter "appsettings*.json" -File | ForEach-Object {
            Write-Host "  ✓ Found: $($_.Name)"
          }
          if (Test-Path "${{env.DOTNET_ROOT}}/myapp/appsettings.Production.json") {
            Write-Host "✅ appsettings.Production.json is included in publish output"
          } else {
            Write-Host "⚠️ appsettings.Production.json is NOT in publish output"
          }

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{env.DOTNET_ROOT}}/myapp

  deploy:
    name: Deploy to Azure App Service
    runs-on: windows-latest
    needs: build
    permissions:
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app

      - name: Validate publish profile
        env:
          PUBLISH_PROFILE: ${{ secrets.PUBLISH_PROFILE }}
        run: |
          if ([string]::IsNullOrEmpty($env:PUBLISH_PROFILE)) {
            Write-Host "❌ PUBLISH_PROFILE secret is not configured"
            Write-Host "ℹ️ To enable deployment:"
            Write-Host "  1. Go to Azure Portal → ClientSpace App Service"
            Write-Host "  2. Click 'Get publish profile' in Overview"
            Write-Host "  3. Copy the entire XML content"
            Write-Host "  4. Go to repository Settings > Secrets and variables > Actions"
            Write-Host "  5. Add secret named 'PUBLISH_PROFILE' with the XML content"
            exit 1
          }
          Write-Host "✅ Publish profile validated"

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'ClientSpace'
          slot-name: 'Production'
          package: .
          publish-profile: ${{ secrets.PUBLISH_PROFILE }}
          
      - name: Deployment Summary
        run: |
          $utcDate = (Get-Date).ToUniversalTime().ToString('yyyy-MM-dd HH:mm:ss')
          Write-Host "## 🚀 ClientSpace Deployment Summary" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          Write-Host "" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          Write-Host "**Status**: ✅ Deployed Successfully" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          Write-Host "**App Service**: ClientSpace" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          Write-Host "**Slot**: Production" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          Write-Host "**Deployment Date**: $utcDate UTC" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          Write-Host "**Commit**: ${{ github.sha }}" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          Write-Host "" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          Write-Host "### ⚙️ Required Azure App Service Configuration" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          Write-Host "To use the Azure AD configuration from appsettings.Production.json:" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          Write-Host "1. Go to Azure Portal → ClientSpace App Service" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          Write-Host "2. Navigate to Settings → Environment variables" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          Write-Host "3. Add or verify: **ASPNETCORE_ENVIRONMENT** = **Production**" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          Write-Host "4. Restart the App Service" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          Write-Host "" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          Write-Host "### Next Steps" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          Write-Host "- Verify the application is running correctly" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          Write-Host "- Check application logs for any errors" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          Write-Host "- Run smoke tests to ensure functionality" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append

  build-api:
    name: Build API
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Build and publish API
        run: |
          dotnet restore
          dotnet build --configuration Release --no-restore
          dotnet publish --configuration Release --output ./publish --no-build
        working-directory: ./src/api-dotnet/WebApi/SharePointExternalUserManager.Api

      - name: Upload API artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-app
          path: ./src/api-dotnet/WebApi/SharePointExternalUserManager.Api/publish

  deploy-api:
    name: Deploy API App Service
    runs-on: ubuntu-latest
    needs: build-api
    continue-on-error: true
    permissions:
      contents: read

    steps:
      - name: Download API artifact
        uses: actions/download-artifact@v4
        with:
          name: api-app
          path: ./api-app

      - name: Check API deployment prerequisites
        id: check-prereqs
        env:
          API_PUBLISH_PROFILE: ${{ secrets.API_PUBLISH_PROFILE }}
        run: |
          if [ -z "$API_PUBLISH_PROFILE" ]; then
            echo "⚠️ API deployment skipped - API_PUBLISH_PROFILE secret not configured"
            echo ""
            echo "ℹ️ To enable API deployment and fix dashboard 404 errors:"
            echo "  1. Deploy or create an Azure App Service for the API"
            echo "  2. Go to Azure Portal → Your API App Service → Overview"
            echo "  3. Click 'Get publish profile' and copy the XML content"
            echo "  4. Go to repository Settings > Secrets and variables > Actions"
            echo "  5. Add secret named 'API_PUBLISH_PROFILE' with the XML content"
            echo "  6. Also add secret 'API_BASE_URL' with the API App Service URL"
            echo "     (e.g. https://your-api.azurewebsites.net)"
            echo "  7. Optionally add 'API_APP_SERVICE_NAME' if the App Service name"
            echo "     differs from the default 'spexternal-api-prod'"
            echo "can-deploy=false" >> $GITHUB_OUTPUT
          else
            echo "✅ API deployment prerequisites validated"
            echo "can-deploy=true" >> $GITHUB_OUTPUT
          fi

      - name: Deploy API to Azure App Service
        if: steps.check-prereqs.outputs.can-deploy == 'true'
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.API_APP_SERVICE_NAME || 'spexternal-api-prod' }}
          package: ./api-app
          publish-profile: ${{ secrets.API_PUBLISH_PROFILE }}
          